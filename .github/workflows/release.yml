name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Create zip
        run: cd resources && tar -czvf dist.tar.gz dist

      - name: Get changelog
        id: changelog
        uses: statamic/changelog-action@v1
        with:
          version: ${{ github.ref }}

      - name: Create release
        env:
          # RELEASE_TOKEN is a personal access token, so the release is authored
          # by that account instead of github-actions.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_VERSION: ${{ steps.changelog.outputs.version }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.text }}
        run: |
          PRERELEASE=""
          if [[ "$RELEASE_VERSION" == *-beta* ]]; then PRERELEASE="--prerelease"; fi
          gh release create "$RELEASE_VERSION" \
            --title "$RELEASE_VERSION" \
            --notes "$RELEASE_NOTES" \
            $PRERELEASE \
            ./resources/dist.tar.gz
